<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Save Our Wildlife promotional video page">
  <title>Save Our Wildlife</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page" aria-labelledby="page-title">
    <h1 id="page-title">Save Our Wildlife</h1>

    <section class="video-section" aria-label="Wildlife promotional video">
      <video id="wildlifeVideo" controls preload="metadata" aria-describedby="videoDescription">
        <source src="wildlife.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>

      <p id="videoDescription" class="description">
        Protecting natural habitats today helps wildlife thrive for generations to come.
      </p>

      <button id="videoActionBtn" type="button" aria-controls="wildlifeVideo" aria-label="Play video">
        Play Video
      </button>
      <p id="statusMessage" class="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
